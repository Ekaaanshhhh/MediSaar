services:
  - type: web
    name: medisaar-ai
    env: docker
    dockerfilePath: ai/Dockerfile
    
    # Environment Variables
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: UPLOAD_DIR
        value: "/tmp/uploads"
      - key: CHROMADB_PATH
        value: "/tmp/chroma_db"
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: medisaar-postgres
          property: connectionString
    
    # Scaling
    numInstances: 1
    plan: free
    
    # Repository Info
    repo: https://github.com/Bhagwan01/MediSaar
    branch: main
    
    # Health Check
    healthCheckPath: /health

databases:
  - name: medisaar-postgres
    databaseName: patient_records
    user: postgres
    plan: free
    postgresMajorVersion: 15