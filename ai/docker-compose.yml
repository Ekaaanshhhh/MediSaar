services:
  postgres:
    image: postgres:15
    container_name: medisaar_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-patient_records}

    # Only expose to host in development
    # Comment out in production
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  api:
    build:
      context: ..
      dockerfile: ai/Dockerfile
    container_name: medisaar_api
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-patient_records}
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY is required}
      CHROMADB_PATH: /app/chroma_db
      UPLOAD_DIR: /app/uploads
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - chroma_data:/app/chroma_db
      - upload_data:/app/uploads

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

volumes:
  postgres_data:
  chroma_data:
  upload_data: